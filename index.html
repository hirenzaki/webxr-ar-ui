<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>WebXR AR &amp; Mid-Air UI (Hit-Test)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
        }
        .hidden { display: none !important; }
        #camera-video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0;
        }
        #gyro-indicator {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,100,0.2);
            border: 1px solid rgba(0,200,120,0.5);
            border-radius: 20px; padding: 4px 14px;
            font-size: 11px; color: #50e3a4;
            z-index: 1000;
        }
        #start-camera-btn {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,180,100,0.85);
            color: #fff; border: none;
            border-radius: 30px;
            padding: 18px 40px;
            font-size: 18px; font-weight: bold;
            z-index: 2000; cursor: pointer;
            box-shadow: 0 4px 24px rgba(0,200,120,0.4);
        }

        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* DOM Overlay Toolbar CSS */
        #dom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: auto;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .toolbar-row {
            display: flex;
            justify-content: space-around;
            gap: 5px;
        }

        .toolbar-btn {
            background-color: #444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 5px;
            font-size: 14px;
            font-weight: bold;
            flex: 1;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .toolbar-btn:active {
            transform: scale(0.95);
        }

        .btn-red { background-color: #aa3333; }
        .btn-green { background-color: #338833; }
        .btn-blue { background-color: #3333aa; }
        .btn-action { background-color: #555555; }

        /* AR操作ヒント */
        #ar-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: #ffffffcc;
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <video id="camera-video" autoplay playsinline muted class="hidden"></video>
    <div id="gyro-indicator" class="hidden">🌀 GYRO ACTIVE</div>
    <button id="start-camera-btn" class="hidden">📷 START CAMERA</button>
    <div id="ar-hint" class="hidden">👆 1本指: 回転 ✌️ 2本指: 拡大・移動</div>

    <!-- デバッグ用エラー表示領域 -->
    <div id="debug-log"
        style="position: absolute; top: 100px; left: 10px; z-index: 9999; color: red; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; pointer-events: none; max-width: 90vw; word-wrap: break-word;">
    </div>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            document.getElementById('debug-log').innerHTML += `<p>Error: ${message} at ${source}:${lineno}</p>`;
        };
        const originalConsoleError = console.error;
        console.error = function (...args) {
            document.getElementById('debug-log').innerHTML += `<p>Console Error: ${args.join(' ')}</p>`;
            originalConsoleError.apply(console, args);
        };
    </script>
    <div id="info">
        <h2>WebXR AR &amp; 空中UI</h2>
        <p>「START AR」後、カメラで床を認識し、白い輪をタップして配置します。<br />
            ブラウザ画面ではスワイプやドラッグでカメラ操作が可能です。</p>
    </div>

    <!-- ツールバー用DOMオーバーレイ -->
    <div id="dom-overlay">
        <div id="toolbar">
            <div class="toolbar-row">
                <button class="toolbar-btn btn-red" data-action="color_red">RED</button>
                <button class="toolbar-btn btn-green" data-action="color_green">GREEN</button>
                <button class="toolbar-btn btn-blue" data-action="color_blue">BLUE</button>
            </div>
            <div class="toolbar-row">
                <button class="toolbar-btn btn-action" data-action="shape_cube">CUBE</button>
                <button class="toolbar-btn btn-action" data-action="shape_sphere">SPHERE</button>
                <button class="toolbar-btn btn-action" data-action="shape_knot">KNOT</button>
            </div>
            <div class="toolbar-row">
                <button class="toolbar-btn btn-action" data-action="scale_up">SCALE +</button>
                <button class="toolbar-btn btn-action" data-action="scale_down">SCALE -</button>
                <button class="toolbar-btn btn-action" style="background-color: #883333;"
                    data-action="action_reset">RESET</button>
            </div>
            <div class="toolbar-row">
                <button class="toolbar-btn btn-action" data-action="anim_toggle">ROTATE</button>
                <button class="toolbar-btn btn-action" data-action="wireframe_toggle">WIRE</button>
            </div>
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- iOS カメラ・ジャイロ制御スクリプト（通常JSで先に実行） -->
    <script>
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const startCameraBtn = document.getElementById('start-camera-btn');
        const cameraVideo    = document.getElementById('camera-video');
        const gyroIndicator  = document.getElementById('gyro-indicator');
        const arHint         = document.getElementById('ar-hint');

        let isCameraActive = false;
        let gyroHandler    = null;

        if (isIOS) {
            startCameraBtn.classList.remove('hidden');

            startCameraBtn.addEventListener('click', async () => {
                // ① カメラ権限を要求
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    cameraVideo.srcObject = stream;
                    cameraVideo.classList.remove('hidden');
                    startCameraBtn.classList.add('hidden');
                    arHint.classList.remove('hidden');
                    isCameraActive = true;
                    window.isCameraActive = true;

                    // ヒントを5秒後に非表示
                    setTimeout(() => { arHint.style.opacity = '0'; }, 5000);
                    setTimeout(() => { arHint.classList.add('hidden'); arHint.style.opacity = '1'; }, 5500);
                } catch(e) {
                    alert('カメラの権限が必要です: ' + e.message);
                    return;
                }

                // ② ジャイロ権限を要求（iOS13+）
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') startGyro();
                    } catch(e) { console.warn('ジャイロ権限エラー', e); }
                } else {
                    startGyro();
                }
            });
        }

        function startGyro() {
            gyroIndicator.classList.remove('hidden');
            gyroHandler = (e) => {
                if (!isCameraActive) return;
                window.__gyroEvent = e;
            };
            window.addEventListener('deviceorientation', gyroHandler, true);
        }

        function stopCamera() {
            if (cameraVideo.srcObject) {
                cameraVideo.srcObject.getTracks().forEach(t => t.stop());
                cameraVideo.srcObject = null;
            }
            cameraVideo.classList.add('hidden');
            gyroIndicator.classList.add('hidden');
            arHint.classList.add('hidden');
            if (gyroHandler) window.removeEventListener('deviceorientation', gyroHandler, true);
            isCameraActive = false;
            window.isCameraActive = false;
            startCameraBtn.classList.remove('hidden');
        }

        window.__stopCamera = stopCamera;
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer;
        let controller;
        let orbitControls;

        // AR & Hit-Test関連
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let isARSession = false;
        let objectPlaced = true;

        // アプリケーション用オブジェクト
        let arContainer;
        let mainObject;
        let targetScale = 1.0;

        // 追加機能のステートとジオメトリ
        let isRotating = true;
        let isWireframe = false;
        let geoKnot, geoCube, geoSphere;

        // ======================================
        // AR タッチジェスチャー管理
        // ======================================
        const touch = {
            active: false,
            count: 0,
            // 1本指回転
            lastX: 0,
            lastY: 0,
            // 2本指ピンチ・移動
            lastMidX: 0,
            lastMidY: 0,
            lastDist: 0,
        };

        function getTouchMidpoint(t1, t2) {
            return {
                x: (t1.clientX + t2.clientX) / 2,
                y: (t1.clientY + t2.clientY) / 2
            };
        }

        function getTouchDist(t1, t2) {
            const dx = t1.clientX - t2.clientX;
            const dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function isOnToolbar(e) {
            return e.target.closest('#toolbar') !== null;
        }

        function setupARTouchControls(canvas) {
            canvas.addEventListener('touchstart', (e) => {
                if (!window.isCameraActive || isOnToolbar(e)) return;
                e.preventDefault();
                touch.count = e.touches.length;

                if (touch.count === 1) {
                    touch.lastX = e.touches[0].clientX;
                    touch.lastY = e.touches[0].clientY;
                } else if (touch.count === 2) {
                    const mid = getTouchMidpoint(e.touches[0], e.touches[1]);
                    touch.lastMidX = mid.x;
                    touch.lastMidY = mid.y;
                    touch.lastDist = getTouchDist(e.touches[0], e.touches[1]);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (!window.isCameraActive || isOnToolbar(e)) return;
                e.preventDefault();
                touch.count = e.touches.length;

                if (touch.count === 1) {
                    // ── 1本指: オブジェクトをY・X軸周りに回転 ──
                    const dx = e.touches[0].clientX - touch.lastX;
                    const dy = e.touches[0].clientY - touch.lastY;
                    arContainer.rotation.y += dx * 0.008;
                    arContainer.rotation.x += dy * 0.008;
                    // 慣性で自動回転をOFF
                    isRotating = false;
                    touch.lastX = e.touches[0].clientX;
                    touch.lastY = e.touches[0].clientY;

                } else if (touch.count === 2) {
                    const t0 = e.touches[0];
                    const t1 = e.touches[1];

                    // ── 2本指ピンチ: スケール変更 ──
                    const dist = getTouchDist(t0, t1);
                    const scaleDelta = dist / touch.lastDist;
                    targetScale = Math.max(0.2, Math.min(4.0, targetScale * scaleDelta));
                    touch.lastDist = dist;

                    // ── 2本指ドラッグ（平行移動）──
                    const mid = getTouchMidpoint(t0, t1);
                    const movX = (mid.x - touch.lastMidX) * 0.003;
                    const movY = (mid.y - touch.lastMidY) * 0.003;
                    arContainer.position.x += movX;
                    arContainer.position.y -= movY;
                    touch.lastMidX = mid.x;
                    touch.lastMidY = mid.y;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                if (!window.isCameraActive) return;
                touch.count = e.touches.length;
                if (touch.count === 1) {
                    // 2本指→1本指に戻った場合、ズレを防ぐため基準点を更新
                    touch.lastX = e.touches[0].clientX;
                    touch.lastY = e.touches[0].clientY;
                }
            }, { passive: true });
        }

        // ======================================
        // 全デバイス共通でThree.jsのシーンを初期化
        // ======================================
        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            camera.position.set(0, 0.5, 2);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // 補助ライト（陰影を立体的に）
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);

            // --- レティクル（Hit-Test用のマーカー） ---
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(- Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // --- コンテナ（配置時にまとめて移動させるため） ---
            arContainer = new THREE.Group();
            arContainer.position.set(0, 0, 0);
            scene.add(arContainer);

            // ジオメトリの初期化
            geoKnot   = new THREE.TorusKnotGeometry(0.15, 0.04, 100, 16);
            geoCube   = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            geoSphere = new THREE.SphereGeometry(0.15, 32, 16);

            // --- メインの3Dオブジェクト ---
            const material = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.2, metalness: 0.8 });
            mainObject = new THREE.Mesh(geoKnot, material);
            mainObject.position.set(0, 0, 0);
            arContainer.add(mainObject);

            // --- レンダラー設定 ---
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // ARタッチジェスチャー初期化
            setupARTouchControls(renderer.domElement);

            // OrbitControlsの追加（PC/非カメラモードでの画面操作用）
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.target.set(0, 0, 0);
            orbitControls.enableDamping = true;
            orbitControls.update();

            // ARスタートボタンをDOMに追加
            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('dom-overlay') }
            }));

            // HTMLツールバーのイベント設定
            setupToolbarEvents();

            // --- ARセッションのイベント ---
            renderer.xr.addEventListener('sessionstart', function () {
                isARSession = true;
                arContainer.visible = false;
                objectPlaced = false;
                reticle.visible = true;
                if (orbitControls) orbitControls.enabled = false;
            });

            renderer.xr.addEventListener('sessionend', function () {
                isARSession = false;
                arContainer.visible = true;
                arContainer.position.set(0, 0, 0);
                arContainer.rotation.set(0, 0, 0);
                objectPlaced = true;
                reticle.visible = false;
                hitTestSourceRequested = false;
                hitTestSource = null;

                if (orbitControls) {
                    camera.position.set(0, 0.5, 2);
                    orbitControls.target.set(0, 0, 0);
                    orbitControls.update();
                    orbitControls.enabled = true;
                }
            });

            // --- インタラクション ---
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
        }

        // ツールバーのイベントハンドラ設定
        function setupToolbarEvents() {
            const buttons = document.querySelectorAll('.toolbar-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (!mainObject) return;
                    const action = e.target.getAttribute('data-action');

                    if (action === 'color_red')   mainObject.material.color.setHex(0xff3333);
                    if (action === 'color_green')  mainObject.material.color.setHex(0x33ff33);
                    if (action === 'color_blue')   mainObject.material.color.setHex(0x3333ff);
                    if (action === 'scale_up')   targetScale = Math.min(4.0, targetScale + 0.3);
                    if (action === 'scale_down') targetScale = Math.max(0.2, targetScale - 0.3);
                    if (action === 'shape_cube')   mainObject.geometry = geoCube;
                    if (action === 'shape_sphere') mainObject.geometry = geoSphere;
                    if (action === 'shape_knot')   mainObject.geometry = geoKnot;
                    if (action === 'anim_toggle')  isRotating = !isRotating;
                    if (action === 'wireframe_toggle') {
                        isWireframe = !isWireframe;
                        mainObject.material.wireframe = isWireframe;
                    }
                    if (action === 'action_reset') {
                        mainObject.geometry = geoKnot;
                        mainObject.material.color.setHex(0x00ff00);
                        targetScale = 1.0;
                        isRotating = true;
                        isWireframe = false;
                        mainObject.material.wireframe = false;
                        arContainer.position.set(0, 0, 0);
                        arContainer.rotation.set(0, 0, 0);
                    }
                });
            });
        }

        // コントローラーまたはスマホのタップ時（ARモード）
        function onSelect(event) {
            if (isARSession && !objectPlaced) {
                if (reticle.visible) {
                    arContainer.position.setFromMatrixPosition(reticle.matrix);
                    const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                    camPos.y = arContainer.position.y;
                    arContainer.lookAt(camPos);
                    arContainer.visible = true;
                    objectPlaced = true;
                    reticle.visible = false;
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            // iOSカメラモード時: OrbitControlsを無効化（タッチジェスチャーでオブジェクトを直接操作）
            if (window.isCameraActive) {
                if (orbitControls) orbitControls.enabled = false;
            } else {
                if (orbitControls) orbitControls.enabled = !isARSession;
            }
            if (orbitControls && orbitControls.enabled) orbitControls.update();

            // スケールのアニメーション（線形補間で滑らかに変化）
            if (mainObject) {
                if (isRotating) {
                    mainObject.rotation.x += 0.005;
                    mainObject.rotation.y += 0.01;
                }
                mainObject.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.15);
            }

            // ARモードかつ未配置の場合のHit-Test処理
            if (frame && isARSession && !objectPlaced) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (referenceSpace) {
                        session.requestHitTestSource({ space: referenceSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
